<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Soul Slash fictional conversation and approval flow</title>
  <desc id="desc">An illustrative Soul Slash dashboard conversation about safely cleaning a Downloads folder, with a review-required plan that moves files to Trash rather than deleting them.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#070814"/><stop offset="0.55" stop-color="#0d0a1d"/><stop offset="1" stop-color="#06161a"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#874dff"/><stop offset="1" stop-color="#c576ff"/></linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#14cdd3"/><stop offset="1" stop-color="#65f0da"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#6545a8" stroke-opacity="0.08"/></pattern>
    <style>
      .ui{font-family:Inter,Segoe UI,Arial,sans-serif}.serif{font-family:Georgia,serif}.muted{fill:#8d8ca2}.label{fill:#9d8cc9;font-size:15px;letter-spacing:3px}.body{fill:#e8e6ef;font-size:21px}.small{font-size:16px}.panel{fill:#0c0d1b;stroke:#363052;stroke-width:1.5}.line{stroke:#443a69;stroke-width:1}.gold{fill:#d9aa63}.cyan{fill:#54e5dc}.purple{fill:#ba7cff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#grid)"/>
  <rect x="26" y="24" width="1548" height="852" rx="14" fill="none" stroke="#6d4caf" stroke-opacity="0.5"/>
  <g class="ui">
    <rect x="26" y="24" width="1548" height="92" rx="14" fill="#090a16"/><path d="M26 116H1574" class="line"/>
    <text x="64" y="79" class="serif" fill="#eeeaf5" font-size="46">Soul<tspan fill="#935cff">/</tspan></text>
    <text x="189" y="77" class="label">LOCAL INTELLIGENCE SUBSTRATE</text>
    <rect x="1164" y="53" width="102" height="34" rx="17" fill="#102c29" stroke="#2f8e82"/><circle cx="1187" cy="70" r="5" fill="#55ead8" filter="url(#glow)"/><text x="1202" y="76" class="cyan small">LOCAL</text>
    <rect x="1282" y="53" width="244" height="34" rx="17" fill="#191228" stroke="#5e3a91"/><text x="1304" y="76" class="purple small">ILLUSTRATIVE DEMO</text>

    <rect x="54" y="142" width="300" height="704" rx="10" class="panel"/><text x="82" y="182" class="label">CONTINUITY</text><text x="82" y="222" fill="#f0edf5" font-size="30">Conversations</text>
    <rect x="80" y="258" width="248" height="94" rx="9" fill="#181229" stroke="#754db3"/><circle cx="104" cy="284" r="6" fill="#ad71ff"/><text x="124" y="290" fill="#f0edf5" font-size="18">Downloads cleanup</text><text x="104" y="319" class="muted small">active · private · local</text>
    <rect x="80" y="370" width="248" height="72" rx="9" fill="#0e101d" stroke="#2c2b43"/><text x="104" y="400" fill="#cbc7d7" font-size="17">Project planning</text><text x="104" y="425" class="muted" font-size="14">yesterday</text>
    <rect x="80" y="460" width="248" height="72" rx="9" fill="#0e101d" stroke="#2c2b43"/><text x="104" y="490" fill="#cbc7d7" font-size="17">System check</text><text x="104" y="515" class="muted" font-size="14">3 days ago</text>
    <circle cx="104" cy="794" r="7" fill="#4ee0d2"/><text x="124" y="800" class="muted small">Stored on this machine</text>

    <rect x="378" y="142" width="824" height="704" rx="10" class="panel"/><text x="410" y="182" class="label">ACTIVE THREAD</text><text x="410" y="220" fill="#f0edf5" font-size="29">Downloads cleanup</text>
    <rect x="1006" y="169" width="157" height="35" rx="17" fill="#121e20" stroke="#316963"/><text x="1032" y="192" class="cyan" font-size="14">PRIVACY · LOCAL</text>
    <path d="M410 244H1170" class="line"/>

    <text x="1110" y="280" class="label" text-anchor="end">YOU</text>
    <rect x="610" y="298" width="536" height="92" rx="14" fill="#181329" stroke="#7043aa"/><text x="640" y="334" class="body">Could you clean up my Downloads folder</text><text x="640" y="365" class="body">without deleting anything permanently?</text>

    <text x="430" y="430" class="label">SOUL/</text>
    <rect x="410" y="448" width="662" height="119" rx="14" fill="#10131f" stroke="#326e69"/><text x="440" y="486" class="body">I inspected Downloads and found 14 files older than</text><text x="440" y="518" class="body">30 days, totaling 2.3 GB. I prepared a bounded plan.</text><text x="440" y="545" class="cyan small">No files have been moved or deleted.</text>

    <rect x="410" y="592" width="730" height="183" rx="12" fill="#11101d" stroke="#b17a35" stroke-width="1.5"/><rect x="410" y="592" width="7" height="183" rx="3" fill="#d8a34d" filter="url(#glow)"/>
    <text x="442" y="628" class="gold" font-size="15" letter-spacing="2.5">REVIEW REQUIRED</text><text x="442" y="663" fill="#f0edf5" font-size="23">Move the exact 14-file set to Trash</text>
    <text x="442" y="695" class="muted small">Recoverable action · no permanent deletion · approval expires</text>
    <rect x="442" y="721" width="152" height="34" rx="7" fill="#251839" stroke="#8656bd"/><text x="480" y="744" class="purple small">REVIEW PLAN</text>
    <rect x="608" y="721" width="110" height="34" rx="7" fill="#0e2424" stroke="#377c75"/><text x="641" y="744" class="cyan small">APPROVE</text>
    <rect x="732" y="721" width="95" height="34" rx="7" fill="#171722" stroke="#444258"/><text x="761" y="744" class="muted small">CANCEL</text>

    <rect x="1226" y="142" width="320" height="704" rx="10" class="panel"/><text x="1256" y="182" class="label">ACTION BOUNDARY</text><text x="1256" y="220" fill="#f0edf5" font-size="27">Plan before action</text>
    <path d="M1256 244H1516" class="line"/>
    <circle cx="1271" cy="286" r="10" fill="#0f302c" stroke="#48dcca"/><path d="M1266 286l4 4 8-9" fill="none" stroke="#55ead8" stroke-width="2"/><text x="1296" y="292" fill="#dcd9e5" font-size="17">Exact file scope</text>
    <circle cx="1271" cy="338" r="10" fill="#0f302c" stroke="#48dcca"/><path d="M1266 338l4 4 8-9" fill="none" stroke="#55ead8" stroke-width="2"/><text x="1296" y="344" fill="#dcd9e5" font-size="17">Recoverable Trash</text>
    <circle cx="1271" cy="390" r="10" fill="#0f302c" stroke="#48dcca"/><path d="M1266 390l4 4 8-9" fill="none" stroke="#55ead8" stroke-width="2"/><text x="1296" y="396" fill="#dcd9e5" font-size="17">Explicit approval</text>
    <circle cx="1271" cy="442" r="10" fill="#0f302c" stroke="#48dcca"/><path d="M1266 442l4 4 8-9" fill="none" stroke="#55ead8" stroke-width="2"/><text x="1296" y="448" fill="#dcd9e5" font-size="17">Verified result</text>
    <rect x="1256" y="494" width="260" height="112" rx="9" fill="#13111d" stroke="#493b55"/><text x="1278" y="526" class="label">CURRENT STATE</text><text x="1278" y="560" class="gold" font-size="23">AWAITING APPROVAL</text><text x="1278" y="584" class="muted" font-size="14">mutation: none</text>
    <rect x="1256" y="632" width="260" height="126" rx="9" fill="#0b171b" stroke="#285b61"/><text x="1278" y="665" class="label">DESIGN INTENT</text><text x="1278" y="700" class="cyan" font-size="19">Natural conversation.</text><text x="1278" y="729" class="cyan" font-size="19">Deterministic action.</text>
    <text x="800" y="868" class="muted small" text-anchor="middle">FICTIONAL DATA · CONCEPTUAL WORKFLOW · NO REAL FILES OR CONVERSATIONS SHOWN</text>
  </g>
</svg>
