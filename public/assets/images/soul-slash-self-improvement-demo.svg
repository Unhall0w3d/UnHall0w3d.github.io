<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Soul Slash fictional Self Improvement assessment</title>
  <desc id="desc">An illustrative Self Improvement dashboard identifying a missing project capability, showing evidence and recommending a proposal while making no changes automatically.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#070814"/><stop offset="0.58" stop-color="#0c0a1d"/><stop offset="1" stop-color="#07171a"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#6545a8" stroke-opacity="0.08"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>.ui{font-family:Inter,Segoe UI,Arial,sans-serif}.serif{font-family:Georgia,serif}.label{fill:#9d8cc9;font-size:15px;letter-spacing:3px}.muted{fill:#8d8ca2}.panel{fill:#0c0d1b;stroke:#363052;stroke-width:1.5}.small{font-size:16px}.cyan{fill:#54e5dc}.purple{fill:#ba7cff}.gold{fill:#d9aa63}.line{stroke:#443a69;stroke-width:1}</style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#grid)"/><rect x="26" y="24" width="1548" height="852" rx="14" fill="none" stroke="#6d4caf" stroke-opacity="0.5"/>
  <g class="ui">
    <rect x="26" y="24" width="1548" height="92" rx="14" fill="#090a16"/><path d="M26 116H1574" class="line"/>
    <text x="64" y="79" class="serif" fill="#eeeaf5" font-size="46">Soul<tspan fill="#935cff">/</tspan></text><text x="189" y="77" class="label">SELF IMPROVEMENT</text>
    <rect x="1216" y="53" width="310" height="34" rx="17" fill="#191228" stroke="#5e3a91"/><text x="1244" y="76" class="purple small">ILLUSTRATIVE DEMO · LOCAL</text>

    <rect x="56" y="146" width="344" height="694" rx="11" class="panel"/><text x="86" y="188" class="label">ASSESSMENT SURFACE</text><text x="86" y="229" fill="#f0edf5" font-size="29">What should improve?</text>
    <rect x="84" y="266" width="288" height="74" rx="9" fill="#17122a" stroke="#744ba7"/><text x="108" y="296" class="purple" font-size="18">Capabilities</text><text x="108" y="322" class="muted" font-size="14">Missing or incomplete workflows</text>
    <rect x="84" y="354" width="288" height="74" rx="9" fill="#0e101d" stroke="#2c2b43"/><text x="108" y="384" fill="#cbc7d7" font-size="18">Environment</text><text x="108" y="410" class="muted" font-size="14">Tools and local readiness</text>
    <rect x="84" y="442" width="288" height="74" rx="9" fill="#0e101d" stroke="#2c2b43"/><text x="108" y="472" fill="#cbc7d7" font-size="18">Models</text><text x="108" y="498" class="muted" font-size="14">Runtime suitability and limits</text>
    <rect x="84" y="530" width="288" height="74" rx="9" fill="#0e101d" stroke="#2c2b43"/><text x="108" y="560" fill="#cbc7d7" font-size="18">Skill loop</text><text x="108" y="586" class="muted" font-size="14">Proposal and review health</text>
    <rect x="84" y="650" width="288" height="130" rx="9" fill="#0b191b" stroke="#285c5e"/><text x="108" y="684" class="label">BOUNDARY</text><text x="108" y="720" class="cyan" font-size="20">Assessment only</text><text x="108" y="748" class="muted small">No installs · no mutation</text>

    <rect x="426" y="146" width="748" height="694" rx="11" class="panel"/><text x="458" y="188" class="label">CAPABILITY ASSESSMENT · COMPLETE</text><text x="458" y="231" fill="#f0edf5" font-size="31">One useful gap deserves review.</text>
    <rect x="1005" y="176" width="130" height="36" rx="18" fill="#102c29" stroke="#2f8e82"/><circle cx="1029" cy="194" r="5" fill="#55ead8" filter="url(#glow)"/><text x="1043" y="200" class="cyan small">BOUNDED</text>
    <path d="M458 258H1142" class="line"/>

    <rect x="458" y="286" width="684" height="148" rx="11" fill="#141020" stroke="#72509e"/><rect x="458" y="286" width="7" height="148" rx="3" fill="#a765ef" filter="url(#glow)"/>
    <text x="490" y="322" class="purple" font-size="15" letter-spacing="2.5">CAPABILITY GAP</text><text x="490" y="359" fill="#f0edf5" font-size="25">Create project-aware changelog briefs</text><text x="490" y="390" class="muted" font-size="17">The current skill registry can inspect Git state, but it cannot turn a bounded</text><text x="490" y="416" class="muted" font-size="17">commit range into a concise, reviewable project update.</text>

    <text x="458" y="478" class="label">EVIDENCE</text>
    <rect x="458" y="500" width="326" height="132" rx="9" fill="#0e111c" stroke="#343348"/><text x="482" y="533" class="muted small">Related capabilities</text><text x="482" y="570" fill="#dedbe6" font-size="19">Git inspection</text><text x="482" y="600" fill="#dedbe6" font-size="19">Markdown artifacts</text>
    <rect x="802" y="500" width="340" height="132" rx="9" fill="#0e111c" stroke="#343348"/><text x="826" y="533" class="muted small">Missing connection</text><text x="826" y="570" fill="#dedbe6" font-size="19">No bounded orchestration</text><text x="826" y="600" fill="#dedbe6" font-size="19">No registered skill contract</text>

    <text x="458" y="676" class="label">RECOMMENDATION</text><text x="458" y="715" fill="#f0edf5" font-size="22">Draft a Skill Studio proposal with read-only Git scope.</text>
    <rect x="458" y="749" width="235" height="42" rx="8" fill="#251839" stroke="#8656bd"/><text x="487" y="776" class="purple small">PREPARE PROPOSAL</text><rect x="710" y="749" width="126" height="42" rx="8" fill="#151621" stroke="#444258"/><text x="748" y="776" class="muted small">DISMISS</text>

    <rect x="1200" y="146" width="344" height="694" rx="11" class="panel"/><text x="1230" y="188" class="label">ASSESSMENT RECORD</text><text x="1230" y="229" fill="#f0edf5" font-size="27">What happened?</text>
    <path d="M1230 254H1514" class="line"/>
    <circle cx="1244" cy="294" r="9" fill="#0e302c" stroke="#48dcca"/><path d="M1239 294l4 4 8-9" fill="none" stroke="#55ead8" stroke-width="2"/><text x="1266" y="300" fill="#dedbe6" font-size="17">Registry inspected</text>
    <circle cx="1244" cy="344" r="9" fill="#0e302c" stroke="#48dcca"/><path d="M1239 344l4 4 8-9" fill="none" stroke="#55ead8" stroke-width="2"/><text x="1266" y="350" fill="#dedbe6" font-size="17">Gap explained</text>
    <circle cx="1244" cy="394" r="9" fill="#0e302c" stroke="#48dcca"/><path d="M1239 394l4 4 8-9" fill="none" stroke="#55ead8" stroke-width="2"/><text x="1266" y="400" fill="#dedbe6" font-size="17">Evidence recorded</text>
    <circle cx="1244" cy="444" r="9" fill="#0e302c" stroke="#48dcca"/><path d="M1239 444l4 4 8-9" fill="none" stroke="#55ead8" stroke-width="2"/><text x="1266" y="450" fill="#dedbe6" font-size="17">Recommendation staged</text>
    <rect x="1230" y="492" width="284" height="120" rx="9" fill="#19130f" stroke="#735329"/><text x="1254" y="527" class="label">MUTATIONS</text><text x="1254" y="565" class="gold" font-size="27">NONE</text><text x="1254" y="591" class="muted" font-size="14">No skill created or promoted</text>
    <rect x="1230" y="640" width="284" height="140" rx="9" fill="#10131e" stroke="#3c3853"/><text x="1254" y="674" class="label">NEXT AUTHORITY</text><text x="1254" y="711" fill="#dedbe6" font-size="18">Human decides whether</text><text x="1254" y="738" fill="#dedbe6" font-size="18">the proposal begins.</text><text x="1254" y="765" class="cyan small">Soul/ does not self-promote.</text>
    <text x="800" y="868" class="muted small" text-anchor="middle">FICTIONAL DATA · CONCEPTUAL ASSESSMENT · NO SYSTEM CHANGES SHOWN</text>
  </g>
</svg>
