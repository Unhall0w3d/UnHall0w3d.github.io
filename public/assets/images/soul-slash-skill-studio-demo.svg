<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Soul Slash Skill Studio fictional lifecycle</title>
  <desc id="desc">An illustrative Skill Studio dashboard showing a capability moving from proposal through isolated beta testing toward human-approved production promotion.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#070814"/><stop offset="0.6" stop-color="#0e091a"/><stop offset="1" stop-color="#071719"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#6545a8" stroke-opacity="0.08"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>.ui{font-family:Inter,Segoe UI,Arial,sans-serif}.serif{font-family:Georgia,serif}.label{fill:#9d8cc9;font-size:15px;letter-spacing:3px}.muted{fill:#8d8ca2}.panel{fill:#0c0d1b;stroke:#363052;stroke-width:1.5}.small{font-size:16px}.cyan{fill:#54e5dc}.purple{fill:#ba7cff}.gold{fill:#d9aa63}.line{stroke:#443a69;stroke-width:1}</style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/><rect width="1600" height="900" fill="url(#grid)"/><rect x="26" y="24" width="1548" height="852" rx="14" fill="none" stroke="#6d4caf" stroke-opacity="0.5"/>
  <g class="ui">
    <rect x="26" y="24" width="1548" height="92" rx="14" fill="#090a16"/><path d="M26 116H1574" class="line"/>
    <text x="64" y="79" class="serif" fill="#eeeaf5" font-size="46">Soul</text><text x="145" y="79" class="serif" fill="#935cff" font-size="46">/</text><text x="189" y="77" class="label">SKILL STUDIO</text>
    <rect x="1216" y="53" width="310" height="34" rx="17" fill="#191228" stroke="#5e3a91"/><text x="1244" y="76" class="purple small">ILLUSTRATIVE DEMO · LOCAL</text>

    <text x="64" y="168" class="label">CONTROLLED CAPABILITY LIFECYCLE</text><text x="64" y="211" fill="#f1eef6" font-size="34">Teach the assistant without trusting the first draft.</text>
    <text x="64" y="242" class="muted" font-size="18">A model may propose. Tests may verify. Only a human may promote.</text>

    <path d="M305 330H585M786 330H1065" stroke="#5d477d" stroke-width="3" stroke-dasharray="8 10"/><circle cx="445" cy="330" r="5" fill="#9b61e4"/><circle cx="925" cy="330" r="5" fill="#3ccdc4"/>
    <rect x="62" y="282" width="346" height="454" rx="12" class="panel"/><rect x="62" y="282" width="346" height="8" rx="4" fill="#8c56d3" filter="url(#glow)"/>
    <text x="92" y="330" class="label">01 · PROPOSAL</text><text x="92" y="373" fill="#f1eef6" font-size="27">Project changelog brief</text><text x="92" y="402" class="purple" font-size="16">skill id · project.changelog_brief</text>
    <path d="M92 428H378" class="line"/>
    <text x="92" y="462" class="muted small">Capability gap</text><text x="92" y="493" fill="#dedbe6" font-size="18">Summarize repository changes into</text><text x="92" y="520" fill="#dedbe6" font-size="18">a reviewable Markdown artifact.</text>
    <text x="92" y="566" class="muted small">Proposed boundary</text><text x="92" y="596" fill="#dedbe6" font-size="18">Read-only Git history</text><text x="92" y="624" fill="#dedbe6" font-size="18">No repository mutation</text><text x="92" y="652" fill="#dedbe6" font-size="18">Bounded commit range</text>
    <rect x="92" y="679" width="184" height="36" rx="8" fill="#251839" stroke="#8656bd"/><text x="119" y="703" class="purple small">GATE 1 · APPROVED</text>

    <rect x="430" y="282" width="346" height="454" rx="12" class="panel"/><rect x="430" y="282" width="346" height="8" rx="4" fill="#24c8bf" filter="url(#glow)"/>
    <text x="460" y="330" class="label">02 · ISOLATED BETA</text><text x="460" y="373" fill="#f1eef6" font-size="27">Candidate implementation</text><text x="460" y="402" class="cyan" font-size="16">revision · 8f21b6a4</text>
    <path d="M460 428H746" class="line"/>
    <text x="460" y="462" class="muted small">Deterministic verification</text><text x="460" y="500" class="cyan" font-size="29">18 / 18 tests pass</text>
    <rect x="460" y="530" width="286" height="112" rx="9" fill="#0c191c" stroke="#286962"/><circle cx="484" cy="558" r="8" fill="#46ddcf"/><text x="504" y="564" fill="#dedbe6" font-size="17">Exact input scope enforced</text><circle cx="484" cy="593" r="8" fill="#46ddcf"/><text x="504" y="599" fill="#dedbe6" font-size="17">No write adapter registered</text><circle cx="484" cy="628" r="8" fill="#46ddcf"/><text x="504" y="634" fill="#dedbe6" font-size="17">Review artifact generated</text>
    <rect x="460" y="679" width="195" height="36" rx="8" fill="#0e2424" stroke="#377c75"/><text x="486" y="703" class="cyan small">CANDIDATE COMPLETE</text>

    <rect x="798" y="282" width="346" height="454" rx="12" class="panel"/><rect x="798" y="282" width="346" height="8" rx="4" fill="#d5a24e" filter="url(#glow)"/>
    <text x="828" y="330" class="label">03 · PRODUCTION</text><text x="828" y="373" fill="#f1eef6" font-size="27">Promotion is separate</text><text x="828" y="402" class="gold" font-size="16">status · awaiting human gate 2</text>
    <path d="M828 428H1114" class="line"/>
    <text x="828" y="462" class="muted small">Required before promotion</text><text x="828" y="500" fill="#dedbe6" font-size="18">Review exact tested revision</text><text x="828" y="532" fill="#dedbe6" font-size="18">Revalidate digest</text><text x="828" y="564" fill="#dedbe6" font-size="18">Confirm exact skill identifier</text><text x="828" y="596" fill="#dedbe6" font-size="18">Record rollback evidence</text>
    <rect x="828" y="630" width="286" height="85" rx="9" fill="#1a1410" stroke="#76582e"/><text x="850" y="662" class="gold" font-size="17">NOT YET TRUSTED</text><text x="850" y="690" class="muted" font-size="15">Passing tests do not grant authority.</text>

    <rect x="1170" y="282" width="366" height="454" rx="12" class="panel"/><text x="1200" y="330" class="label">WHY THE GATES EXIST</text><text x="1200" y="372" fill="#f1eef6" font-size="25">Growth without drift</text>
    <path d="M1200 396H1506" class="line"/>
    <text x="1200" y="438" class="purple" font-size="18">Proposal</text><text x="1200" y="465" class="muted small">Defines intent and boundaries.</text>
    <text x="1200" y="514" class="cyan" font-size="18">Beta</text><text x="1200" y="541" class="muted small">Implements and verifies in isolation.</text>
    <text x="1200" y="590" class="gold" font-size="18">Production</text><text x="1200" y="617" class="muted small">Requires explicit human promotion.</text>
    <rect x="1200" y="656" width="306" height="59" rx="9" fill="#151121" stroke="#5c3c84"/><text x="1222" y="692" fill="#d9d5e3" font-size="17">No automatic promotion path.</text>

    <rect x="62" y="766" width="1474" height="72" rx="10" fill="#0b121a" stroke="#29464f"/><text x="90" y="796" class="label">CURRENT OPERATION</text><text x="90" y="823" class="cyan" font-size="17">Foreground · bounded · reviewable · terminates cleanly</text><text x="1510" y="811" class="muted small" text-anchor="end">FICTIONAL SKILL · CONCEPTUAL WORKFLOW</text>
  </g>
</svg>
